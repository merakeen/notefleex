<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary meta -->
  <meta name="description" content="notefleex — a private, markdown-first notes app. Everything runs on your device. No account, no cloud, no tracking." />
  <meta name="author" content="merakeen studio" />
  <meta name="application-name" content="notefleex" />

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="notefleex" />

  <meta name="theme-color" content="#5492e3" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="notefleex — private notes, on-device" />

  <meta property="og:image:alt" content="notefleex app icon" />
  <meta property="og:site_name" content="notefleex" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="notefleex — private notes, on-device" />
  <meta name="twitter:description" content="Markdown notes that live entirely on your device. No cloud, no tracking." />
  <meta name="twitter:image" content="/web-app-manifest-512x512.png" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <title>notefleex: your private notes vault</title>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

</html>
